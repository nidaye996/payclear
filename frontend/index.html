<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薪核通 PayClear - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 50%, #1a3a5c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            font-size: 56px;
            display: block;
            margin-bottom: 12px;
        }

        .logo-area h1 {
            font-size: 22px;
            color: #1a3a5c;
            font-weight: 700;
            line-height: 1.4;
        }

        .logo-area p {
            color: #888;
            font-size: 13px;
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #444;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #2d6a9f;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2d6a9f, #1a3a5c);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }

        .btn-login:hover { opacity: 0.9; }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

        .error-msg {
            background: #fff3f3;
            border: 1px solid #ffcdd2;
            color: #c62828;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }

        .footer-hint {
            text-align: center;
            margin-top: 24px;
            color: #aaa;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-area">
            <span class="logo-icon">🏗️</span>
            <h1>薪核通 PayClear</h1>
            <p>工程项目工资管理平台</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">登 录</button>
            <div class="error-msg" id="errorMsg"></div>
        </form>

        <div class="footer-hint">首次部署时由部署脚本创建管理员账号</div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        // 已登录则跳转
        if (isLoggedIn()) {
            window.location.href = '/dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errDiv = document.getElementById('errorMsg');

            if (!username || !password) {
                errDiv.textContent = '请输入用户名和密码';
                errDiv.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';
            errDiv.style.display = 'none';

            try {
                await login(username, password);
                window.location.href = '/dashboard.html';
            } catch (err) {
                errDiv.textContent = err.message || '登录失败，请检查用户名和密码';
                errDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        });
    </script>
</body>
</html>
